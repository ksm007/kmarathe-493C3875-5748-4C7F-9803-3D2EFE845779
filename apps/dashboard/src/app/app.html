<div
  *ngIf="isAuthenticated(); else authLayout"
  class="min-h-screen bg-background text-on-background"
>
  <aside
    class="fixed left-0 top-0 z-30 hidden h-screen w-64 flex-col border-r border-outline-variant bg-surface-container-low p-4 md:flex"
  >
    <div class="mb-8 flex items-center gap-3 px-4">
      <div
        class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary text-on-primary"
      >
        <span class="material-symbols-outlined fill text-[18px]"
          >corporate_fare</span
        >
      </div>
      <div>
        <h1
          class="font-h3 text-h4 font-black uppercase tracking-wider text-on-surface"
        >
          The Enterprise
        </h1>
        <p class="font-label-md text-label-md text-on-surface-variant">
          Task Management
        </p>
      </div>
    </div>

    <nav class="flex-1 space-y-1">
      <a
        routerLink="/tasks"
        routerLinkActive="enterprise-nav-link-active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="enterprise-nav-link"
      >
        <span class="material-symbols-outlined">check_circle</span>
        My Tasks
      </a>
      <a
        routerLink="/ai-chat"
        routerLinkActive="enterprise-nav-link-active"
        class="enterprise-nav-link"
      >
        <span class="material-symbols-outlined">auto_awesome</span>
        AI Chat
      </a>
      <a
        routerLink="/reports/standup"
        routerLinkActive="enterprise-nav-link-active"
        class="enterprise-nav-link"
      >
        <span class="material-symbols-outlined">description</span>
        Standup Report
      </a>
      <a
        *ngIf="canViewAudit()"
        routerLink="/team"
        routerLinkActive="enterprise-nav-link-active"
        class="enterprise-nav-link"
      >
        <span class="material-symbols-outlined">group</span>
        Team
      </a>
      <a
        *ngIf="canViewAudit()"
        routerLink="/audit-log"
        routerLinkActive="enterprise-nav-link-active"
        class="enterprise-nav-link"
      >
        <span class="material-symbols-outlined">history</span>
        Audit Logs
      </a>
    </nav>

    <div class="mt-auto space-y-1 border-t border-outline-variant pt-4">
      <button
        class="enterprise-nav-link w-full text-left"
        type="button"
        (click)="logout()"
      >
        <span class="material-symbols-outlined">logout</span>
        Sign Out
      </button>
    </div>
  </aside>

  <div class="min-h-screen md:ml-64">
    <header
      class="fixed left-0 right-0 top-0 z-20 flex h-16 items-center justify-between border-b border-outline-variant/70 bg-surface-container-lowest/85 px-4 backdrop-blur-md md:left-64 md:px-8"
    >
      <div class="flex flex-1 items-center gap-4"></div>

      <div class="flex items-center gap-2 sm:gap-4">
        <button
          class="taskcore-icon-button"
          type="button"
          (click)="toggleTheme()"
        >
          <span class="material-symbols-outlined"
            >{{ isDarkTheme() ? 'light_mode' : 'dark_mode' }}</span
          >
        </button>
        <div class="hidden h-8 w-px bg-outline-variant sm:block"></div>
        <button
          class="flex items-center gap-2 rounded-full border border-transparent p-1 pr-3 transition-all hover:border-outline-variant hover:bg-surface-container-low"
          type="button"
        >
          <div
            class="flex h-8 w-8 items-center justify-center rounded-full bg-primary-container text-xs font-semibold text-on-primary-container"
          >
            {{ initials() }}
          </div>
          <span
            class="hidden font-label-md text-label-md text-on-surface sm:block"
            >{{ user()?.fullName }}</span
          >
        </button>
      </div>
    </header>

    <main
      class="min-h-[calc(100vh-4rem)] bg-background px-4 pb-8 pt-20 md:px-margin"
    >
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<ng-template #authLayout>
  <div class="min-h-screen bg-surface">
    <router-outlet></router-outlet>
  </div>
</ng-template>

<app-toast-outlet></app-toast-outlet>
